name: iOS Nightly Beta Build

on:
  push:
    branches: [ ios-pipeline ]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  LIFT_BRO_ADMOB_APP_ID: ${{ secrets.LIFT_BRO_ADMOB_APP_ID }}
  LIFT_BRO_AD_UNIT_ID: ${{ secrets.LIFT_BRO_AD_UNIT_ID }}
  MATCH_GIT_PRIVATE_KEY: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}
  MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
  MATCH_PASSWORD: ${{ secrets.FASTLANE_MATCH_PASSWORD }}
  FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
  FASTLANE_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}

jobs:
  ios_build:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true

      - name: Check for recent commits
        id: check_changes
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            CHANGES=$(git rev-list --count --since="24 hours ago" HEAD)
            echo "changes=$CHANGES" >> $GITHUB_OUTPUT
          else
            echo "changes=1" >> $GITHUB_OUTPUT
          fi

      - name: Setup SSH Agent for Match
        if: steps.check_changes.outputs.changes != '0'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}

      - name: Run tests
        if: steps.check_changes.outputs.changes != '0'
        run: |
          bundle install
          bundle exec fastlane ios test

      - name: Build And Release iOS
        if: steps.check_changes.outputs.changes != '0'
        run: |
          bundle install
          bundle exec fastlane ios beta build_number:${{ github.run_number }}

      - name: Upload IPA Artifact
        if: steps.check_changes.outputs.changes != '0'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/artifacts/ios/
          if-no-files-found: warn
          retention-days: 7
