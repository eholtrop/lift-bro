name: iOS Build Test

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  # Provide required BuildKonfig environment variables with safe dummy values
  LIFT_BRO_ADMOB_APP_ID: ${{ secrets.LIFT_BRO_ADMOB_APP_ID }}
  LIFT_BRO_AD_UNIT_ID: ${{ secrets.LIFT_BRO_AD_UNIT_ID }}
  # Match/signing secrets for development certificates
  MATCH_GIT_PRIVATE_KEY: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}
  FASTLANE_MATCH_PASSWORD: ${{ secrets.FASTLANE_MATCH_PASSWORD }}
  FASTLANE_USER: ${{ secrets.FASTLANE_USER }}

jobs:
  ios_build:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true

      - name: Check for recent commits
        id: check_changes
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            CHANGES=$(git rev-list --count --since="24 hours ago" HEAD)
            echo "changes=$CHANGES" >> $GITHUB_OUTPUT
          else
            echo "changes=1" >> $GITHUB_OUTPUT
          fi

      - name: Setup SSH Agent for Match
        if: steps.check_changes.outputs.changes != '0'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}

      - name: Force git to use SSH for github.com
        if: steps.check_changes.outputs.changes != '0'
        run: git config --global url."git@github.com:".insteadOf "https://github.com/"

      - name: Build iOS IPA
        if: steps.check_changes.outputs.changes != '0'
        run: |
          bundle install
          bundle exec fastlane ios build_debug build_number:${{ github.run_number }}
          bundle exec fastlane ios build_release build_number:${{ github.run_number }}

      - name: Upload IPA Artifact
        if: steps.check_changes.outputs.changes != '0'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/artifacts/ios/
          if-no-files-found: warn
          retention-days: 7
