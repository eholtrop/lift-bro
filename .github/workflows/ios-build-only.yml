name: iOS Nightly Beta Build

on:
  workflow_dispatch:

env:
  LIFT_BRO_ADMOB_APP_ID: ${{ secrets.LIFT_BRO_ADMOB_APP_ID }}
  LIFT_BRO_AD_UNIT_ID: ${{ secrets.LIFT_BRO_AD_UNIT_ID }}
  MATCH_GIT_PRIVATE_KEY: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}
  MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
  MATCH_PASSWORD: ${{ secrets.FASTLANE_MATCH_PASSWORD }}
  APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
  APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
  APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}

jobs:
  ios_build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -r | head -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -r | head -1)
          fi
          if [ -z "$XCODE_PATH" ]; then
            echo "No Xcode found at /Applications"
          else
            sudo xcode-select -s "$XCODE_PATH"
            echo "Selected Xcode at $XCODE_PATH"
          fi
          xcode-select -p
          xcodebuild -version

      - name: Check for recent commits
        id: check_changes
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            CHANGES=$(git rev-list --count --since="24 hours ago" HEAD)
            echo "changes=$CHANGES" >> $GITHUB_OUTPUT
          else
            echo "changes=1" >> $GITHUB_OUTPUT
          fi

      - name: Setup SSH Agent for Match
        if: steps.check_changes.outputs.changes != '0'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}

      - name: Run tests
        if: steps.check_changes.outputs.changes != '0'
        run: |
          bundle install
          bundle exec fastlane ios test

      - name: Build And Release iOS
        if: steps.check_changes.outputs.changes != '0'
        run: |
          bundle install
          bundle exec fastlane ios beta build_number:${{ github.run_number }}

      - name: Upload IPA Artifact
        if: steps.check_changes.outputs.changes != '0'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/artifacts/ios/
          if-no-files-found: warn
          retention-days: 7
