name: Android Maestro UI Tests (PR)

on: [pull_request]

env:
  LIFT_BRO_SENTRY_DSN: ${{ secrets.LIFT_BRO_SENTRY_DSN }}
  REVENUE_CAT_API_KEY: ${{ secrets.REVENUE_CAT_API_KEY }}

jobs:
  maestro-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v3
      - run: ./gradlew assembleDebug
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: maestro_test_emulator
          script: |
            adb install app-android/build/outputs/apk/debug/app-debug.apk
            curl -Ls "https://get.maestro.mobile.dev" | bash
            export PATH="$HOME/.maestro/bin:$PATH"
            maestro test .maestro/calendar_workout_flow.yaml .maestro/manual_creation_flow.yaml --format junit --output maestro-android-results.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-android-results
          path: maestro-android-results.xml
