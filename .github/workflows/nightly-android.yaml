name: Nightly Android Build

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  LIFT_BRO_ADMOB_APP_ID: ${{ secrets.LIFT_BRO_ADMOB_APP_ID }}
  LIFT_BRO_AD_UNIT_ID: ${{ secrets.LIFT_BRO_AD_UNIT_ID }}
  LIFT_BRO_SENTRY_DSN: ${{ secrets.LIFT_BRO_SENTRY_DSN }}
  REVENUE_CAT_API_KEY: ${{ secrets.REVENUE_CAT_API_KEY_ANDROID }}

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            CHANGES=$(git rev-list --count --since="24 hours ago" HEAD)
            if [ "$CHANGES" -gt 0 ]; then
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  lint:
    needs: [check-changes]
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew detekt --continue

  test:
    needs: [check-changes]
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew test

  screenshot-validation:
    needs: [check-changes]
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :presentation:compose:validateDebugScreenshotTest -Pandroid.experimental.enableScreenshotTest=true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshot-diff-report
          path: presentation/compose/build/reports/screenshotTest/

  deploy:
    needs: [check-changes, lint, test, screenshot-validation]
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true
      - uses: timheuer/base64-to-file@v1.2
        with:
          fileName: release.jks
          fileDir: app-android
          encodedString: ${{ secrets.RELEASE_KEYSTORE }}
      - uses: jsdaniell/create-json@v1.2.3
        with:
          name: key.json
          json: ${{ secrets.FASTLANE_JSON }}
      - uses: jsdaniell/create-json@v1.2.3
        with:
          name: google-services.json
          json: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
          dir: presentation/compose/src/androidMain
      - name: Deploy with Fastlane
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PW }}
          KEY_ALIAS: ${{ secrets.KEYSTORE_USR }}
          KEY_PASSWORD: ${{ secrets.KEY_PW }}
        run: |
          bundle install
          bundle exec fastlane android deploy build_number:${{ github.run_number }}
      - uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: app-android/build/outputs/bundle/release/*.aab
