appId: com.lift.bro

---
- runFlow:
    file: onboarding_select_bro.yaml
- tapOn: "Consent"
- tapOn: "Continue"
- tapOn: "🦺 Restore from a Backup"
- waitForAnimationToEnd:
    timeout: 1000
# Android
- tapOn:
    text: "screenshot_test_backup.json"
    optional: true
# iOS
- tapOn:
    id: "screenshot_test_backup.json, json"
    optional: true
